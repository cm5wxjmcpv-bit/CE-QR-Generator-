<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instructor Dashboard | Martinsville Fire & EMS CE Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Open Sans', sans-serif;
    background: url('ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG') no-repeat center center fixed;
    background-size: cover;
    color: white;
    min-height: 100vh;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: 1;
  }
  .container {
    position: relative;
    z-index: 2;
    background: rgba(11, 28, 44, 0.92);
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    max-width: 800px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    animation: fadeIn 1s ease;
  }
  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.95);} to {opacity: 1; transform: scale(1);} }
  h1 { text-align: center; color: #ff4c4c; font-family: 'Oswald', sans-serif; margin-bottom: 10px; }
  .controls { text-align: center; margin-bottom: 20px; }
  .subtle { text-align: center; color: #ffc3c3; margin: 8px 0; }
  button {
    background: #b22222; color: white; border: none; border-radius: 6px;
    padding: 10px 16px; margin: 5px; font-size: 15px; cursor: pointer; transition: 0.3s;
  }
  button:hover { background: #ff4c4c; transform: scale(1.05); }
  input {
    margin: 6px 0; padding: 10px; width: 100%; font-size: 16px;
    border-radius: 5px; border: none; text-align: left; box-sizing: border-box;
  }
  .record {
    border-bottom: 1px solid #ff4c4c; padding: 10px 0; display: flex; align-items: center; flex-wrap: wrap;
  }
  .record img {
    width: 90px; margin-right: 15px; border-radius: 6px; box-shadow: 0 0 10px rgba(255, 76, 76, 0.4);
  }
  .record-info { flex: 1; }
  .record-info strong { color: #ff4c4c; }
  .hidden { display: none; }
  .error-text { color: #ff8080; text-align: center; min-height: 20px; }
  footer { text-align: center; color: #ff4c4c; margin-top: 20px; font-size: 0.8em; }
</style>
</head>

<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Instructor Dashboard</h1>

    <div id="loginPanel">
      <p class="subtle">Log in with your instructor username and password.</p>
      <input type="text" id="instructorUsername" placeholder="Instructor Username" autocomplete="username" />
      <input type="password" id="instructorPassword" placeholder="Instructor Password" autocomplete="current-password" />
      <div class="controls">
        <button onclick="loginInstructor()">Login</button>
      </div>
      <p id="loginMsg" class="error-text"></p>
    </div>

    <div id="dashboardPanel" class="hidden">
      <p id="sessionInfo" class="subtle"></p>
      <div class="controls">
        <button onclick="refreshData()">🔄 Refresh</button>
        <button onclick="exportPDF()">📄 Export PDF</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
      <div id="records"><p>Loading student records...</p></div>
    </div>

    <footer>© 2025 Martinsville Fire & EMS • CE Instructor Portal</footer>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz4fAjnjqfybEBRVnFhQcnAnlOfyRUlYP5f34yZMUjaaSsBwRzPmaK6tfWFsB4kha-6/exec";
let instructorSession = null;

function sanitizeSlug(slug) {
  return String(slug || '')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9-]/g, '-')
    .replace(/-{2,}/g, '-')
    .replace(/^-+|-+$/g, '');
}

function requestedSlugFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return sanitizeSlug(urlParams.get('instructor') || '');
}

async function apiPost(payload) {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return response.json();
}

async function loginInstructor() {
  const username = document.getElementById('instructorUsername').value.trim();
  const password = document.getElementById('instructorPassword').value;
  const requestedSlug = requestedSlugFromUrl();
  const msg = document.getElementById('loginMsg');
  msg.textContent = '';

  if (!username || !password) {
    msg.textContent = 'Username and password are required.';
    return;
  }

  try {
    const data = await apiPost({ action: 'instructorLogin', username, password, requestedSlug });
    if (!data.ok) {
      msg.textContent = data.message || 'Login failed.';
      return;
    }

    instructorSession = {
      username,
      password,
      displayName: data.user?.displayName || username,
      instructorSlug: sanitizeSlug(data.user?.instructorSlug || '')
    };

    showDashboard();
    await refreshData();
  } catch (error) {
    msg.textContent = `Login error: ${error.message}`;
  }
}

function showDashboard() {
  if (!instructorSession) return;
  document.getElementById('sessionInfo').textContent = `Signed in as ${instructorSession.displayName} (${instructorSession.username}) • Instructor ID: ${instructorSession.instructorSlug}`;
  document.getElementById('dashboardPanel').classList.remove('hidden');
  document.getElementById('loginPanel').classList.add('hidden');
}

async function refreshData() {
  const recordsDiv = document.getElementById('records');
  if (!instructorSession) {
    recordsDiv.innerHTML = '<p>Please log in first.</p>';
    return;
  }

  recordsDiv.innerHTML = '<p>Loading student records...</p>';

  try {
    const data = await apiPost({
      action: 'getInstructorRecords',
      instructorUsername: instructorSession.username,
      instructorPassword: instructorSession.password,
      requestedSlug: requestedSlugFromUrl() || instructorSession.instructorSlug
    });

    if (!data.ok) {
      recordsDiv.innerHTML = `<p>${data.message || data.error || 'Unable to load records.'}</p>`;
      return;
    }

    const records = data.records || [];
    if (!records.length) {
      recordsDiv.innerHTML = '<p>No student submissions found for this instructor.</p>';
      return;
    }

    recordsDiv.innerHTML = '';
    records.forEach(r => {
      const div = document.createElement('div');
      div.className = 'record';
      div.innerHTML = `
        <img src="${r.image}" alt="QR">
        <div class="record-info">
          <p><strong>${r.studentFirst} ${r.studentLast}</strong> — ${r.certNumber}</p>
          <p>${new Date(r.timestamp).toLocaleString()}</p>
          <p><small>${r.codeText}</small></p>
        </div>
      `;
      recordsDiv.appendChild(div);
    });
  } catch (err) {
    console.error(err);
    recordsDiv.innerHTML = '<p>Error loading records.</p>';
  }
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;
  doc.setFontSize(16);
  doc.text('Instructor CE Records', 10, 10);

  document.querySelectorAll('.record-info').forEach(info => {
    const lines = info.innerText.split('\n');
    lines.forEach(line => {
      doc.text(line.trim(), 10, y);
      y += 8;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    });
    y += 4;
  });
  doc.save('Instructor_CE_Records.pdf');
}

function logout() {
  instructorSession = null;
  document.getElementById('instructorPassword').value = '';
  document.getElementById('dashboardPanel').classList.add('hidden');
  document.getElementById('loginPanel').classList.remove('hidden');
}
</script>
</body>
</html>
