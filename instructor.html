<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instructor Dashboard | Martinsville Fire & EMS CE Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Open Sans', sans-serif;
    background: url('ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG') no-repeat center center fixed;
    background-size: cover;
    color: white;
    min-height: 100vh;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    z-index: 1;
  }
  .container {
    position: relative;
    z-index: 2;
    background: rgba(11, 28, 44, 0.92);
    margin: 30px auto;
    padding: 28px;
    border-radius: 12px;
    max-width: 900px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    animation: fadeIn 1s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  h1, h2 {
    text-align: center;
    color: #ff4c4c;
    font-family: 'Oswald', sans-serif;
    margin: 0 0 10px;
  }
  .subtitle {
    text-align: center;
    color: #f3d5d5;
    margin-bottom: 20px;
  }
  .login-box, .records-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-top: 18px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  label {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 6px;
    color: #f2d8d8;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    margin: 0;
    padding: 10px 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
  }
  button {
    background: #b22222;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    margin: 5px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover {
    background: #ff4c4c;
    transform: scale(1.03);
  }
  .controls {
    text-align: center;
    margin-bottom: 20px;
  }
  .status {
    text-align: center;
    min-height: 22px;
    font-weight: 700;
    margin-top: 12px;
  }
  .error { color: #ff8080; }
  .success { color: #9cffb7; }
  .record {
    border-bottom: 1px solid #ff4c4c;
    padding: 12px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .record img {
    width: 90px;
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(255, 76, 76, 0.4);
  }
  .record-info {
    flex: 1;
    min-width: 220px;
  }
  .record-info strong { color: #ff4c4c; }
  .code-line {
    font-size: 0.9rem;
    opacity: 0.92;
    word-break: break-all;
  }
  .hidden { display: none; }
  footer {
    text-align: center;
    color: #ff4c4c;
    margin-top: 20px;
    font-size: 0.8em;
  }
  @media (max-width: 700px) {
    .container { margin: 16px; padding: 18px; }
    .form-grid { grid-template-columns: 1fr; }
    button { width: 100%; margin: 6px 0; }
  }
</style>
</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <h1>Instructor Dashboard</h1>
    <p class="subtitle">Instructor login required to view your student records</p>

    <div id="loginBox" class="login-box">
      <h2>Instructor Login</h2>
      <div class="form-grid">
        <div>
          <label for="instUser">Username</label>
          <input id="instUser" type="text" autocomplete="username" placeholder="Instructor username" />
        </div>
        <div>
          <label for="instPass">Password</label>
          <input id="instPass" type="password" autocomplete="current-password" placeholder="Instructor password" />
        </div>
      </div>
      <div class="controls">
        <button onclick="loginInstructor()">Login</button>
      </div>
      <div id="loginMsg" class="status"></div>
    </div>

    <div id="recordsBox" class="records-box hidden">
      <div class="controls">
        <button onclick="refreshData()">🔄 Refresh</button>
        <button onclick="exportPDF()">📄 Export PDF</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
      <div id="records"><p>Loading student records...</p></div>
    </div>

    <footer>© 2025 Martinsville Fire & EMS • CE Instructor Portal</footer>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQfPdwMmZWDH3b4xreLhGf26VZy93ibvKh2Zcwt_hTDUi9z7rupETP9QUeZLgzs_3A/exec";

function qs(params) {
  return new URLSearchParams(params).toString();
}

async function apiGet(params) {
  const res = await fetch(`${SCRIPT_URL}?${qs(params)}`, { method: "GET", cache: "no-store" });
  const text = await res.text();
  return JSON.parse(text);
}

function getSession() {
  try {
    return JSON.parse(sessionStorage.getItem("ceInstructorSession") || "null");
  } catch {
    return null;
  }
}

function setSession(data) {
  sessionStorage.setItem("ceInstructorSession", JSON.stringify(data));
}

function clearSession() {
  sessionStorage.removeItem("ceInstructorSession");
}

async function loginInstructor() {
  const username = document.getElementById("instUser").value.trim();
  const password = document.getElementById("instPass").value.trim();
  const msg = document.getElementById("loginMsg");
  msg.className = "status";
  msg.textContent = "Logging in...";

  if (!username || !password) {
    msg.className = "status error";
    msg.textContent = "Enter username and password.";
    return;
  }

  try {
    const data = await apiGet({
      action: "instructorLogin",
      username,
      password
    });

    if (!data.ok || !data.user) {
      msg.className = "status error";
      msg.textContent = data.error || "Invalid instructor login.";
      return;
    }

    const user = data.user;

    setSession({
      username,
      password,
      displayName: user.displayName || username,
      instructorSlug: user.instructorSlug || ""
    });

    msg.className = "status success";
    msg.textContent = "Login successful.";
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("recordsBox").classList.remove("hidden");
    refreshData();
  } catch (err) {
    msg.className = "status error";
    msg.textContent = err.message || "Unable to log in.";
  }
}

async function refreshData() {
  const session = getSession();
  const recordsDiv = document.getElementById("records");
  recordsDiv.innerHTML = "<p>Loading student records...</p>";

  if (!session || !session.username || !session.password) {
    recordsDiv.innerHTML = "<p>Please log in again.</p>";
    return;
  }

  try {
    const data = await apiGet({
      action: "getInstructorRecords",
      username: session.username,
      password: session.password
    });

    if (!data.ok) {
      recordsDiv.innerHTML = `<p class="error">${data.error || "Unauthorized."}</p>`;
      return;
    }

    const records = Array.isArray(data.records) ? data.records : [];
    if (!records.length) {
      recordsDiv.innerHTML = "<p>No student submissions found for this instructor.</p>";
      return;
    }

    recordsDiv.innerHTML = "";
    records.forEach(r => {
      const div = document.createElement("div");
      div.className = "record";
      div.innerHTML = `
        ${r.image ? `<img src="${r.image}" alt="QR">` : ""}
        <div class="record-info">
          <p><strong>${escapeHtml(r.studentFirst || "")} ${escapeHtml(r.studentLast || "")}</strong> — ${escapeHtml(r.certNumber || "")}</p>
          <p>${new Date(r.timestamp).toLocaleString()}</p>
          <p>Instructor: ${escapeHtml(r.instructor || "")}</p>
          <p class="code-line">${escapeHtml(r.codeText || "")}</p>
        </div>
      `;
      recordsDiv.appendChild(div);
    });
  } catch (err) {
    recordsDiv.innerHTML = `<p class="error">${err.message || "Error loading records."}</p>`;
  }
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;
  doc.setFontSize(16);
  doc.text("Instructor CE Records", 10, 10);

  document.querySelectorAll(".record-info").forEach(info => {
    const lines = info.innerText.split("\n");
    lines.forEach(line => {
      doc.text(line.trim(), 10, y);
      y += 8;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    });
    y += 4;
  });

  doc.save("Instructor_CE_Records.pdf");
}

function logout() {
  clearSession();
  document.getElementById("recordsBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("instPass").value = "";
  document.getElementById("loginMsg").textContent = "";
  document.getElementById("records").innerHTML = "<p>Loading student records...</p>";
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

window.addEventListener("load", () => {
  const session = getSession();
  if (session && session.username && session.password) {
    document.getElementById("instUser").value = session.username || "";
    document.getElementById("instPass").value = session.password || "";
    loginInstructor();
  }
});
</script>
</body>
</html>
