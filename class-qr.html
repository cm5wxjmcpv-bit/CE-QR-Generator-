<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Sign-In QR | Martinsville Fire & EMS CE Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body {
    font-family: 'Open Sans', sans-serif;
    background: url('ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG') no-repeat center center fixed;
    background-size: cover;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.68);
    z-index: 1;
  }

  .stage {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(8px, 1.5vmin, 18px);
    overflow: hidden;
  }

  .qr-card {
    width: min(96vw, 1050px);
    height: calc(100vh - 20px);
    height: calc(100dvh - 20px);
    max-height: calc(100vh - 20px);
    max-height: calc(100dvh - 20px);
    background: rgba(11, 28, 44, 0.94);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    box-shadow: 0 0 28px rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: clamp(10px, 1.8vmin, 22px);
    gap: clamp(6px, 1.1vmin, 12px);
    animation: fadeIn 0.7s ease;
    overflow: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .top-area {
    flex: 0 0 auto;
    display: grid;
    justify-items: center;
    gap: clamp(4px, 0.8vmin, 9px);
  }

  .logo {
    width: clamp(58px, 8vmin, 84px);
    height: clamp(58px, 8vmin, 84px);
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff4c4c;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    color: #ff4c4c;
    margin: 0;
    font-size: clamp(1.65rem, 4vmin, 3.4rem);
    line-height: 0.98;
  }

  .instructions {
    color: #ffffff;
    font-size: clamp(1rem, 2.7vmin, 1.85rem);
    font-weight: 700;
    margin: 0;
    line-height: 1.1;
  }

  .sub-instructions,
  .url-text {
    display: none;
  }

  .qr-wrap {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #qrCode {
    --qr-padding: clamp(8px, 1.35vmin, 16px);
    background: #ffffff;
    padding: var(--qr-padding);
    border-radius: 18px;
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 100%;
    max-height: 100%;
    overflow: hidden;
    flex: 0 0 auto;
  }

  #qrCode img,
  #qrCode canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #message {
    flex: 0 0 auto;
  }

  .error {
    color: #ffb0b0;
    background: rgba(255, 76, 76, 0.1);
    border: 1px solid #ff4c4c;
    padding: 10px;
    border-radius: 8px;
    margin: 0;
  }

  footer {
    flex: 0 0 auto;
    color: #ff4c4c;
    font-size: clamp(0.7rem, 1.45vmin, 0.9rem);
    line-height: 1.1;
  }

  @media (max-height: 700px) {
    .logo { display: none; }
    h1 { font-size: clamp(1.45rem, 4vmin, 2.7rem); }
    .instructions { font-size: clamp(0.95rem, 2.4vmin, 1.45rem); }
  }

  @media (max-height: 560px) {
    .top-area { gap: 3px; }
    .qr-card { gap: 5px; }
  }

  @media (max-width: 700px) {
    .stage { padding: 8px; }
    .qr-card {
      width: calc(100vw - 16px);
      height: calc(100dvh - 16px);
      max-height: calc(100dvh - 16px);
      border-radius: 14px;
    }
  }
</style>
</head>
<body>
  <div class="overlay"></div>

  <main class="stage">
    <section class="qr-card" aria-label="Student sign-in QR code">
      <div class="top-area">
        <img src="ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG" class="logo" alt="Martinsville Fire & EMS Logo">
        <h1>Martinsville<br>Fire & EMS</h1>
        <p class="instructions">Scan the QR code and enter your information.</p>
        <p class="sub-instructions">Use your phone camera to open the CE attendance form.</p>
      </div>

      <div class="qr-wrap">
        <div id="qrCode" aria-label="QR code for student CE attendance form"></div>
      </div>

      <div id="urlText" class="url-text"></div>
      <div id="message"></div>
      <footer>© 2026 Martinsville Fire & EMS • CE Portal</footer>
    </section>
  </main>

<script>
function getStudentFormUrl() {
  const params = new URLSearchParams(window.location.search);
  const instructor = String(params.get("instructor") || "").trim();
  const formUrl = new URL("index.html", window.location.href);

  if (instructor) {
    formUrl.searchParams.set("instructor", instructor);
  }

  return formUrl.toString();
}

function getQrPadding() {
  const qrHolder = document.getElementById("qrCode");
  const styles = window.getComputedStyle(qrHolder);

  return {
    x: parseFloat(styles.paddingLeft || 0) + parseFloat(styles.paddingRight || 0),
    y: parseFloat(styles.paddingTop || 0) + parseFloat(styles.paddingBottom || 0)
  };
}

function getQrSize() {
  const qrWrap = document.querySelector(".qr-wrap");
  const card = document.querySelector(".qr-card");
  const padding = getQrPadding();

  const wrapRect = qrWrap.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();

  let availableWidth = wrapRect.width;
  let availableHeight = wrapRect.height;

  if (!availableHeight || availableHeight < 250) {
    const cardStyles = window.getComputedStyle(card);
    const cardPaddingY = parseFloat(cardStyles.paddingTop || 0) + parseFloat(cardStyles.paddingBottom || 0);
    const cardGap = parseFloat(cardStyles.rowGap || cardStyles.gap || 0) || 0;
    const fixedItems = Array.from(card.children).filter(el => !el.classList.contains("qr-wrap"));
    const fixedHeight = fixedItems.reduce((sum, el) => sum + el.getBoundingClientRect().height, 0);
    availableHeight = cardRect.height - cardPaddingY - fixedHeight - (cardGap * 4);
  }

  const safetyGap = 4;
  const maxInnerWidth = Math.max(180, availableWidth - padding.x - safetyGap);
  const maxInnerHeight = Math.max(180, availableHeight - padding.y - safetyGap);

  return Math.floor(Math.min(maxInnerWidth, maxInnerHeight));
}

function renderQr() {
  const qrHolder = document.getElementById("qrCode");
  const urlText = document.getElementById("urlText");
  const message = document.getElementById("message");
  const studentFormUrl = getStudentFormUrl();
  const qrSize = getQrSize();
  const padding = getQrPadding();

  qrHolder.innerHTML = "";
  message.innerHTML = "";
  urlText.textContent = studentFormUrl;

  qrHolder.style.width = `${qrSize + padding.x}px`;
  qrHolder.style.height = `${qrSize + padding.y}px`;

  try {
    new QRCode(qrHolder, {
      text: studentFormUrl,
      width: qrSize,
      height: qrSize,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch (err) {
    message.innerHTML = '<div class="error">Unable to load the QR code. Refresh this page and try again.</div>';
  }
}

function scheduleRender(delay = 0) {
  window.clearTimeout(window.ceQrResizeTimer);
  window.ceQrResizeTimer = window.setTimeout(() => {
    window.requestAnimationFrame(renderQr);
  }, delay);
}

window.addEventListener("resize", () => scheduleRender(150));
window.addEventListener("orientationchange", () => scheduleRender(300));
window.addEventListener("load", () => {
  window.requestAnimationFrame(() => {
    window.requestAnimationFrame(renderQr);
  });
});
</script>
</body>
</html>
