<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Sign-In QR | Martinsville Fire & EMS CE Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body {
    font-family: 'Open Sans', sans-serif;
    background: url('ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG') no-repeat center center fixed;
    background-size: cover;
    color: white;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.68);
    z-index: 1;
  }

  .stage {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(8px, 1.5vmin, 18px);
    overflow: hidden;
  }

  .qr-card {
    width: min(96vw, 1050px);
    height: calc(100vh - 20px);
    height: calc(100dvh - 20px);
    max-height: calc(100vh - 20px);
    max-height: calc(100dvh - 20px);
    background: rgba(11, 28, 44, 0.94);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    box-shadow: 0 0 28px rgba(0, 0, 0, 0.85);
    display: grid;
    grid-template-rows: auto auto auto minmax(0, 1fr) auto;
    justify-items: center;
    align-items: center;
    text-align: center;
    padding: clamp(10px, 2vmin, 22px);
    gap: clamp(4px, 1vmin, 10px);
    animation: fadeIn 0.7s ease;
    overflow: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .logo {
    width: clamp(58px, 9vmin, 92px);
    height: clamp(58px, 9vmin, 92px);
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff4c4c;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    color: #ff4c4c;
    margin: 0;
    font-size: clamp(1.55rem, 4.4vmin, 3.7rem);
    line-height: 1;
  }

  .instructions {
    color: #ffffff;
    font-size: clamp(1rem, 3vmin, 2rem);
    font-weight: 700;
    margin: 0;
    line-height: 1.15;
  }

  .sub-instructions {
    color: #f3d5d5;
    font-size: clamp(0.85rem, 2vmin, 1.15rem);
    margin: 0;
    line-height: 1.2;
  }

  .qr-wrap {
    width: 100%;
    height: 100%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qrCode {
    background: #ffffff;
    padding: clamp(10px, 2vmin, 24px);
    border-radius: 18px;
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 100%;
    max-height: 100%;
  }

  #qrCode img,
  #qrCode canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    height: auto;
  }

  .url-text {
    display: none;
  }

  .error {
    color: #ffb0b0;
    background: rgba(255, 76, 76, 0.1);
    border: 1px solid #ff4c4c;
    padding: 10px;
    border-radius: 8px;
    margin: 0;
  }

  footer {
    color: #ff4c4c;
    font-size: clamp(0.7rem, 1.6vmin, 0.9rem);
    line-height: 1.1;
  }

  @media (max-height: 650px) {
    .logo { display: none; }
    .qr-card {
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }
    .sub-instructions { display: none; }
  }

  @media (max-width: 700px) {
    .stage { padding: 8px; }
    .qr-card {
      width: calc(100vw - 16px);
      height: calc(100dvh - 16px);
      max-height: calc(100dvh - 16px);
      border-radius: 14px;
    }
  }
</style>
</head>
<body>
  <div class="overlay"></div>

  <main class="stage">
    <section class="qr-card" aria-label="Student sign-in QR code">
      <img src="ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG" class="logo" alt="Martinsville Fire & EMS Logo">
      <h1>Martinsville<br>Fire & EMS</h1>
      <p class="instructions">Scan the QR code and enter your information.</p>
      <p class="sub-instructions">Use your phone camera to open the CE attendance form.</p>
      <div class="qr-wrap">
        <div id="qrCode" aria-label="QR code for student CE attendance form"></div>
      </div>
      <div id="urlText" class="url-text"></div>
      <div id="message"></div>
      <footer>© 2026 Martinsville Fire & EMS • CE Portal</footer>
    </section>
  </main>

<script>
function getStudentFormUrl() {
  const params = new URLSearchParams(window.location.search);
  const instructor = String(params.get("instructor") || "").trim();
  const formUrl = new URL("index.html", window.location.href);

  if (instructor) {
    formUrl.searchParams.set("instructor", instructor);
  }

  return formUrl.toString();
}

function getQrSize() {
  const width = window.innerWidth || 800;
  const height = window.innerHeight || 600;
  const isShortScreen = height < 650;
  const reservedHeight = isShortScreen ? 150 : 245;
  const availableHeight = Math.max(220, height - reservedHeight);
  const availableWidth = Math.max(220, width - 90);
  return Math.floor(Math.min(700, availableHeight, availableWidth));
}

function renderQr() {
  const qrHolder = document.getElementById("qrCode");
  const urlText = document.getElementById("urlText");
  const message = document.getElementById("message");
  const studentFormUrl = getStudentFormUrl();
  const qrSize = getQrSize();

  qrHolder.innerHTML = "";
  message.innerHTML = "";
  urlText.textContent = studentFormUrl;

  try {
    new QRCode(qrHolder, {
      text: studentFormUrl,
      width: qrSize,
      height: qrSize,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch (err) {
    message.innerHTML = '<div class="error">Unable to load the QR code. Refresh this page and try again.</div>';
  }
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderQr, 200);
});

window.addEventListener("orientationchange", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderQr, 300);
});

window.addEventListener("load", renderQr);
</script>
</body>
</html>
