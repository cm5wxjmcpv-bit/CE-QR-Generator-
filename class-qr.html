<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Sign-In QR | Martinsville Fire & EMS CE Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Open Sans', sans-serif;
    background: url('ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG') no-repeat center center fixed;
    background-size: cover;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.68);
    z-index: 1;
  }

  .stage {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }

  .qr-card {
    width: min(94vw, 900px);
    min-height: min(92vh, 860px);
    background: rgba(11, 28, 44, 0.94);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    box-shadow: 0 0 28px rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 28px;
    animation: fadeIn 0.7s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .logo {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 10px;
    box-shadow: 0 0 10px #ff4c4c;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    color: #ff4c4c;
    margin: 0 0 8px;
    font-size: clamp(2rem, 5vw, 4.2rem);
    line-height: 1.05;
  }

  .instructions {
    color: #ffffff;
    font-size: clamp(1.35rem, 3vw, 2.4rem);
    font-weight: 700;
    margin: 8px 0 22px;
  }

  .sub-instructions {
    color: #f3d5d5;
    font-size: clamp(1rem, 2vw, 1.35rem);
    margin: -8px 0 24px;
  }

  #qrCode {
    background: #ffffff;
    padding: clamp(14px, 2.5vw, 28px);
    border-radius: 18px;
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 95%;
  }

  #qrCode img,
  #qrCode canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }

  .url-text {
    max-width: 760px;
    color: #f3d5d5;
    font-size: clamp(0.9rem, 1.6vw, 1.1rem);
    margin-top: 18px;
    word-break: break-word;
  }

  .error {
    color: #ffb0b0;
    background: rgba(255, 76, 76, 0.1);
    border: 1px solid #ff4c4c;
    padding: 12px;
    border-radius: 8px;
    margin-top: 14px;
  }

  footer {
    color: #ff4c4c;
    margin-top: 18px;
    font-size: 0.9rem;
  }

  @media (max-width: 700px) {
    .stage { padding: 14px; }
    .qr-card { min-height: 94vh; padding: 18px; }
    .logo { width: 78px; height: 78px; }
  }
</style>
</head>
<body>
  <div class="overlay"></div>

  <main class="stage">
    <section class="qr-card" aria-label="Student sign-in QR code">
      <img src="ABE9E472-6FA5-46E6-866D-992B713B5B5B.JPG" class="logo" alt="Martinsville Fire & EMS Logo">
      <h1>Martinsville<br>Fire & EMS</h1>
      <p class="instructions">Scan the QR code and enter your information.</p>
      <p class="sub-instructions">Use your phone camera to open the CE attendance form.</p>
      <div id="qrCode" aria-label="QR code for student CE attendance form"></div>
      <div id="urlText" class="url-text"></div>
      <div id="message"></div>
      <footer>© 2026 Martinsville Fire & EMS • CE Portal</footer>
    </section>
  </main>

<script>
function getStudentFormUrl() {
  const params = new URLSearchParams(window.location.search);
  const instructor = String(params.get("instructor") || "").trim();
  const formUrl = new URL("index.html", window.location.href);

  if (instructor) {
    formUrl.searchParams.set("instructor", instructor);
  }

  return formUrl.toString();
}

function getQrSize() {
  const smallestSide = Math.min(window.innerWidth, window.innerHeight);
  return Math.min(620, Math.max(280, Math.floor(smallestSide * 0.55)));
}

function renderQr() {
  const qrHolder = document.getElementById("qrCode");
  const urlText = document.getElementById("urlText");
  const message = document.getElementById("message");
  const studentFormUrl = getStudentFormUrl();
  const qrSize = getQrSize();

  qrHolder.innerHTML = "";
  message.innerHTML = "";
  urlText.textContent = studentFormUrl;

  try {
    new QRCode(qrHolder, {
      text: studentFormUrl,
      width: qrSize,
      height: qrSize,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch (err) {
    message.innerHTML = '<div class="error">Unable to load the QR code. Refresh this page and try again.</div>';
  }
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderQr, 200);
});

window.addEventListener("load", renderQr);
</script>
</body>
</html>
